name: Test Suite
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v2
      - name: Build test harness
        run: nim c -d:test_harness -d:release --path:src -o:dingbat_test tests/dingbat_test.nim
      - name: Build test runner
        run: nim c -d:test_harness -d:release --path:src --path:tests -o:dingbat_test_runner tests/dingbat_test_runner.nim
      - name: Run tests
        run: ./dingbat_test_runner
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/results.md
